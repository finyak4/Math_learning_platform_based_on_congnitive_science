
{% load static %}
<header>
    <div class="logo">
        <a href="{% url 'index' %}" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: inherit;">
            <img src="{% static 'img/logo.svg' %}" alt="Calculus Platform Logo" width="32" height="32">
            <span>Calculus Platform</span>
        </a>
    </div>
    <nav>
        <ul>
            <li><a href="{% url 'index' %}">Home</a></li>
            <li><a href="{% url 'notes_index' %}">Notes</a></li>
            <li><a href="{% url 'quiz_list' %}">Quizzes</a></li>
            {% if user.is_authenticated %}
            <li><a href="{% url 'profile' %}">Profile</a></li>
            <li>
                <form action="{% url 'logout' %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">Log Out</button>
                </form>
            </li>
            {% else %}
            <li><a href="{% url 'login' %}">Log In</a></li>
            <li><a href="{% url 'signup' %}" style="color: var(--primary-color); font-weight: 600;">Sign Up</a></li>
            {% endif %}
        </ul>
    </nav>
</header>
