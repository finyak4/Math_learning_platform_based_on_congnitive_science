{% extends "base.html" %}
{% load i18n %}

{% block title %}Page Not Found - Calculus Platform{% endblock %}

{% block content %}
<div style="min-height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem;">
    <h1 style="font-size: 6rem; margin: 0; background: linear-gradient(135deg, #2563eb, #764ba2); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;">404</h1>
    <h2 style="font-size: 2rem; color: #1e293b; margin-top: 1rem;">Page Not Found</h2>
    <p style="color: #64748b; font-size: 1.1rem; max-width: 500px; margin: 1rem auto 2rem;">
        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
    </p>
    <a href="/" style="display: inline-block; padding: 0.75rem 2rem; background: #0f172a; color: white; text-decoration: none; border-radius: 9999px; font-weight: 600; transition: transform 0.2s;">
        Return Home
    </a>
</div>
{% endblock %}
