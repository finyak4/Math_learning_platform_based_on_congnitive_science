{% extends 'base.html' %}

{% block title %}Log In - Calculus Platform{% endblock %}

{% block content %}
<div
    style="max-width: 400px; margin: 4rem auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; margin-bottom: 2rem; color: #1e293b;">Log In</h2>
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            {% for field in form %}
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label for="{{ field.id_for_label }}" style="font-weight: 500; color: #475569;">{{ field.label}}</label>
                {{ field }}
                {% if field.errors %}
                <div style="color: #ef4444; font-size: 0.875rem;">{{ field.errors.0 }}</div>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        <button type="submit"
            style="width: 100%; margin-top: 2rem; padding: 0.75rem; background: #0f172a; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Log
            In</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: #64748b;">
        Don't have an account? <a href="{% url 'signup' %}"
            style="color: #2563eb; text-decoration: none; font-weight: 500;">Sign up</a>
    </p>
</div>
{% endblock %}
