{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Password Reset Complete" %}{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto; padding: 2.5rem; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
    <div style="width: 64px; height: 64px; background: #dcfce7; color: #166534; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    </div>

    <h2 style="margin-bottom: 1rem; color: #1e293b;">{% trans "Password Changed!" %}</h2>
    
    <p style="color: #64748b; line-height: 1.6; margin-bottom: 2rem;">
        {% trans "Your password has been set. You may go ahead and log in now." %}
    </p>

    <a href="{% url 'account_login' %}" style="display: inline-block; padding: 0.75rem 2rem; background: #0f172a; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; transition: background-color 0.2s;">
        {% trans "Log In" %}
    </a>
</div>
{% endblock %}
